name: Fetch Dota 2 Leaderboard

on:
  schedule:
    # Run once per day at 12:15 UTC
    - cron: "15 12 * * *"
  workflow_dispatch: # Allow manual triggering

jobs:
  fetch-leaderboard:
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.commit.outputs.changes }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Europe leaderboard snapshot
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          mkdir -p data/snapshots/europe
          URL="https://www.dota2.com/webapi/ILeaderboard/GetDivisionLeaderboard/v0001?division=europe&leaderboard=0"
          MAX_ATTEMPTS=5
          RESPONSE=""
          SUCCESS=false
          
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Fetch attempt $attempt/$MAX_ATTEMPTS..."
            if RESPONSE=$(curl -sS --fail --max-time 30 "$URL"); then
              if echo "$RESPONSE" | jq -e '.leaderboard != null' > /dev/null; then
                SUCCESS=true
                break
              fi
              echo "Attempt $attempt failed: response validation failed (leaderboard missing or null)."
            else
              echo "Attempt $attempt failed: curl error."
            fi
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              BACKOFF_SECONDS=$((2 ** attempt))
              if [ "$BACKOFF_SECONDS" -gt 16 ]; then
                BACKOFF_SECONDS=16
              fi
              echo "Retrying in ${BACKOFF_SECONDS}s..."
              sleep "$BACKOFF_SECONDS"
            fi
          done
          
          # Check if the 'leaderboard' key exists and is not null
          if [ "$SUCCESS" = "true" ]; then
            echo "$RESPONSE" | jq -c '[.leaderboard[:5000] | sort_by(.rank)[] | [.name, .country, .team_tag] | until(.[-1] != null or length == 1; .[:-1])]' > "data/snapshots/europe/${DATE}.json"
          else
            echo "Error: Response validation failed after ${MAX_ATTEMPTS} attempts (leaderboard missing or null). API response:"
            if [ -n "$RESPONSE" ]; then
              echo "$RESPONSE"
            else
              echo "No response body received."
            fi
            exit 1 # Fail the step explicitly instead of creating bad data
          fi

      - name: Commit and push snapshot
        id: commit
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "maakep-bot"
          git add data/snapshots/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "snapshot europe - $(date -u +'%Y-%m-%d')"
            git push
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

  trigger-deploy:
    needs: fetch-leaderboard
    runs-on: ubuntu-latest
    if: needs.fetch-leaderboard.outputs.changes == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      actions: write
    steps:
      - name: Trigger Build and Deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-web.yml',
              ref: 'main'
            })
